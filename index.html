<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Triolocke · SoulSilver</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;600&display=swap');

:root{
  --bg: #0b0d13;
  --bg-elev: #12151e;
  --panel: #191d29;
  --panel-2: #1f2433;
  --border: #2a2f40;
  --silver: #c9cfdd;
  --silver-dim: #7d8497;
  --silver-bright: #f1f3f8;
  --accent: #9fb2da;
  --accent-dim: #556488;
  --danger: #d1495b;
  --danger-dim: #7a3138;
  --gold: #c9a86a;
}

*{ box-sizing: border-box; }
html,body{ margin:0; padding:0; }

body{
  background: radial-gradient(ellipse at 50% -10%, #1b2033 0%, var(--bg) 55%);
  color: var(--silver);
  font-family: 'Inter', sans-serif;
  min-height: 100vh;
  padding-bottom: 60px;
}

::selection{ background: var(--accent-dim); color: var(--silver-bright); }

.mono{ font-family: 'JetBrains Mono', monospace; }

/* ---------- Header ---------- */
header{
  padding: 28px 20px 18px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
header::before{
  content:"";
  position:absolute; top:-120px; left:50%; transform:translateX(-50%);
  width: 480px; height: 240px;
  background: radial-gradient(circle, rgba(159,178,218,0.16) 0%, rgba(159,178,218,0) 70%);
  pointer-events:none;
}
.logo{
  font-family: 'Rajdhani', sans-serif;
  font-weight: 700;
  font-size: 30px;
  letter-spacing: 6px;
  margin: 0;
  background: linear-gradient(100deg, var(--silver-dim) 0%, var(--silver-bright) 25%, var(--accent) 45%, var(--silver-bright) 65%, var(--silver-dim) 100%);
  background-size: 250% 100%;
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  animation: shimmer 7s linear infinite;
  cursor: pointer;
}
@keyframes shimmer{
  0%{ background-position: 200% 0; }
  100%{ background-position: -50% 0; }
}
.subtitle{
  font-size: 12px;
  letter-spacing: 3px;
  color: var(--silver-dim);
  text-transform: uppercase;
  margin-top: 4px;
}

nav{
  display:flex; justify-content:center; gap: 6px;
  margin-top: 20px;
  flex-wrap: wrap;
}
.nav-btn{
  background: transparent;
  border: 1px solid var(--border);
  color: var(--silver-dim);
  font-family: 'Rajdhani', sans-serif;
  font-weight:600;
  letter-spacing: 1.5px;
  font-size: 13px;
  padding: 8px 18px;
  border-radius: 999px;
  cursor:pointer;
  transition: all .15s ease;
}
.nav-btn:hover{ color: var(--silver-bright); border-color: var(--accent-dim); }
.nav-btn.active{ background: var(--panel-2); color: var(--silver-bright); border-color: var(--accent); }

main{ max-width: 1000px; margin: 0 auto; padding: 20px; }

/* ---------- Podium (home) ---------- */
.podium{
  display:flex; align-items:flex-end; justify-content:center;
  gap: 18px; margin-top: 30px; flex-wrap: wrap;
}
.profile-card{
  background: linear-gradient(160deg, var(--panel) 0%, var(--bg-elev) 100%);
  border: 1px solid var(--border);
  border-radius: 16px;
  width: 220px;
  padding: 22px 18px 20px;
  text-align:center;
  cursor:pointer;
  position:relative;
  transition: transform .18s ease, border-color .18s ease, box-shadow .18s ease;
}
.profile-card:hover{
  transform: translateY(-4px);
  border-color: var(--accent-dim);
  box-shadow: 0 10px 30px rgba(0,0,0,0.35);
}
.profile-card.rank-1{ order:2; padding-top: 30px; padding-bottom: 28px; border-color: var(--accent-dim); }
.profile-card.rank-2{ order:1; opacity: .96; }
.profile-card.rank-3{ order:3; opacity: .92; }

.rank-badge{
  position:absolute; top:-14px; left:50%; transform:translateX(-50%);
  width: 28px; height:28px; border-radius:50%;
  background: var(--bg-elev);
  border: 1px solid var(--border);
  display:flex; align-items:center; justify-content:center;
  font-family:'Rajdhani', sans-serif; font-weight:700; font-size:13px;
  color: var(--silver-dim);
}
.rank-1 .rank-badge{ color: var(--gold); border-color: var(--gold); }

.trainer-name{
  font-family:'Rajdhani', sans-serif;
  font-size: 20px; font-weight:700; letter-spacing:1px;
  color: var(--silver-bright);
  margin: 6px 0 2px;
}
.hearts-count{
  font-size: 34px; font-weight:600;
  margin: 6px 0 0;
}
.hearts-count.danger{ color: var(--danger); }
.hearts-count small{ font-size: 15px; color: var(--silver-dim); font-weight:400; }

.mini-team{
  display:flex; justify-content:center; gap: 5px; margin-top: 14px; flex-wrap:wrap;
}
.mini-slot{
  width: 26px; height:26px; border-radius:50%;
  background: var(--bg);
  border: 1px solid var(--border);
  overflow:hidden;
}
.mini-slot img{ width:100%; height:100%; object-fit: cover; }

.team-count{
  margin-top: 10px; font-size: 11px; color: var(--silver-dim); letter-spacing: 1px;
}

/* ---------- Profile view ---------- */
.back-btn{
  background:none; border:none; color: var(--silver-dim);
  font-family:'Rajdhani', sans-serif; font-size:14px; letter-spacing:1px;
  cursor:pointer; padding: 4px 0; margin-bottom: 10px;
}
.back-btn:hover{ color: var(--silver-bright); }

.profile-header{
  text-align:center; margin-bottom: 24px;
}
.profile-header h2{
  font-family:'Rajdhani', sans-serif; font-size: 32px; letter-spacing:2px;
  color: var(--silver-bright); margin: 0;
}

.hearts-panel{
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 24px;
  text-align:center;
  margin-bottom: 26px;
}
.big-count{
  font-family:'JetBrains Mono', monospace;
  font-size: 46px; font-weight:600; color: var(--silver-bright);
}
.big-count.danger{ color: var(--danger); }
.big-count span{ font-size: 20px; color: var(--silver-dim); }

.hearts-grid{
  display:flex; flex-wrap:wrap; justify-content:center;
  gap: 6px; margin: 18px 0;
  max-width: 420px; margin-left:auto; margin-right:auto;
}
.gem{
  width: 16px; height:16px;
  background: var(--accent);
  clip-path: polygon(50% 0%, 100% 38%, 82% 100%, 18% 100%, 0% 38%);
  transition: background .2s ease, opacity .2s ease;
}
.gem.empty{ background: var(--border); opacity: .5; }

.action-row{ display:flex; gap: 10px; justify-content:center; margin-top: 16px; flex-wrap:wrap; }

button.primary{
  background: var(--panel-2);
  border: 1px solid var(--accent-dim);
  color: var(--silver-bright);
  font-family:'Rajdhani', sans-serif; font-weight:600; letter-spacing:1px;
  padding: 10px 20px; border-radius: 10px; cursor:pointer; font-size:14px;
  transition: all .15s ease;
}
button.primary:hover{ border-color: var(--accent); background:#242a3b; }
button.danger-outline{
  background:transparent; border:1px solid var(--danger-dim); color: var(--danger);
  font-family:'Rajdhani', sans-serif; font-weight:600; letter-spacing:1px;
  padding:10px 20px; border-radius:10px; cursor:pointer; font-size:14px;
}
button.danger-outline:hover{ background: rgba(209,73,91,0.08); }
button.ghost{
  background:transparent; border:1px solid var(--border); color: var(--silver-dim);
  font-family:'Rajdhani', sans-serif; font-weight:600; letter-spacing:1px;
  padding:8px 14px; border-radius:8px; cursor:pointer; font-size:13px;
}
button.ghost:hover{ color:var(--silver-bright); border-color: var(--accent-dim); }

.gem-break{
  animation: breakGem .35s ease;
}
@keyframes breakGem{
  0%{ transform: scale(1) rotate(0deg); }
  40%{ transform: scale(1.4) rotate(10deg); opacity: .6; }
  100%{ transform: scale(1) rotate(0deg); opacity: .5; }
}

/* ---------- Team ---------- */
.section-label{
  font-family:'Rajdhani', sans-serif; letter-spacing:2px; text-transform:uppercase;
  color: var(--silver-dim); font-size:13px; margin: 24px 0 12px; text-align:center;
}
.team-grid{
  display:grid; grid-template-columns: repeat(3, 1fr); gap: 12px;
  max-width: 560px; margin: 0 auto;
}
@media (max-width: 560px){ .team-grid{ grid-template-columns: repeat(2, 1fr); } }

.poke-slot{
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 14px 10px;
  text-align:center;
  position:relative;
  min-height: 130px;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
}
.poke-slot img{ width:56px; height:56px; object-fit:contain; margin-bottom:6px; filter: drop-shadow(0 2px 6px rgba(0,0,0,0.4)); }
.poke-nick{ font-family:'Rajdhani', sans-serif; font-weight:700; color: var(--silver-bright); font-size:15px; }
.poke-species{ font-size: 11px; color: var(--silver-dim); text-transform: capitalize; margin-top:1px; }
.poke-remove{
  position:absolute; top:6px; right:8px;
  background:none; border:none; color: var(--silver-dim);
  cursor:pointer; font-size: 14px; line-height:1;
}
.poke-remove:hover{ color: var(--danger); }

.poke-slot.empty{
  border-style: dashed; cursor:pointer; color: var(--silver-dim);
  font-family:'Rajdhani', sans-serif; font-size: 13px; letter-spacing:1px;
}
.poke-slot.empty:hover{ border-color: var(--accent-dim); color: var(--silver-bright); }

/* ---------- History ---------- */
.history-list{ max-width: 640px; margin: 20px auto 0; display:flex; flex-direction:column; gap: 8px; }
.history-item{
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 16px;
  font-size: 13px;
  display:flex; justify-content:space-between; align-items:center; gap: 10px;
}
.history-item .h-text{ color: var(--silver); }
.history-item .h-time{ color: var(--silver-dim); font-size:11px; white-space:nowrap; }
.empty-state{ text-align:center; color: var(--silver-dim); margin-top: 40px; font-size:14px; }

/* ---------- Normas ---------- */
.normas-list{ max-width: 640px; margin: 20px auto 0; display:flex; flex-direction:column; gap: 10px; }
.norma-item{
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px 16px;
  font-size: 13px;
  display:flex; flex-direction:column; gap: 8px;
}
.norma-item .n-text{ color: var(--silver-bright); white-space: pre-wrap; line-height: 1.5; }
.norma-item .n-meta{ color: var(--silver-dim); font-size: 11px; letter-spacing:.5px; text-align:right; }

/* ---------- Trade ---------- */
.trade-header{ display:flex; justify-content:center; margin: 18px 0 26px; }
.offer-card{
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 16px 18px;
  max-width: 640px; margin: 0 auto 16px;
}
.offer-top{ display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
.offer-trainer{ font-family:'Rajdhani', sans-serif; font-weight:700; color: var(--silver-bright); font-size:16px; }
.offer-time{ font-size: 11px; color: var(--silver-dim); }
.chip-row{ display:flex; flex-wrap:wrap; gap: 8px; }
.chip{
  display:flex; align-items:center; gap: 6px;
  background: var(--bg-elev); border:1px solid var(--border); border-radius: 999px;
  padding: 4px 10px 4px 4px; font-size: 12px;
}
.chip img{ width: 20px; height:20px; object-fit:contain; }
.chip span{ text-transform:capitalize; }
.counters{ margin-top: 12px; padding-top: 12px; border-top: 1px dashed var(--border); }
.counter-item{ margin-bottom: 10px; }
.counter-top{ display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
.counter-name{ font-size:13px; color: var(--silver); font-family:'Rajdhani', sans-serif; font-weight:600; }
.offer-actions{ display:flex; gap:8px; margin-top: 10px; flex-wrap:wrap; }

.section-sub{
  font-family:'Rajdhani', sans-serif; letter-spacing:2px; text-transform:uppercase;
  color: var(--silver-dim); font-size: 13px; text-align:center; margin: 32px 0 14px;
}

/* ---------- Modal ---------- */
.modal-overlay{
  position:fixed; inset:0; background: rgba(6,7,11,0.72);
  display:flex; align-items:center; justify-content:center; z-index: 100;
  padding: 20px;
}
.modal{
  background: var(--bg-elev);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 26px;
  width: 100%; max-width: 420px;
  max-height: 85vh; overflow-y:auto;
}
.modal h3{
  font-family:'Rajdhani', sans-serif; letter-spacing:1px; color: var(--silver-bright);
  margin: 0 0 16px; font-size: 20px;
}
.field{ margin-bottom: 14px; }
.field label{ display:block; font-size: 12px; color: var(--silver-dim); margin-bottom:6px; letter-spacing:0.5px; }
.field input, .field select{
  width:100%; background: var(--panel); border:1px solid var(--border); border-radius:8px;
  padding: 10px 12px; color: var(--silver-bright); font-family:'Inter', sans-serif; font-size: 14px;
}
.field textarea{
  width:100%; background: var(--panel); border:1px solid var(--border); border-radius:8px;
  padding: 10px 12px; color: var(--silver-bright); font-family:'Inter', sans-serif; font-size: 14px;
  min-height: 90px; resize: vertical; font-family:'Inter', sans-serif;
}
.field input:focus, .field select:focus, .field textarea:focus{ outline:none; border-color: var(--accent-dim); }
.modal-actions{ display:flex; gap:10px; justify-content:flex-end; margin-top: 18px; }
.err-msg{ color: var(--danger); font-size: 12px; margin-top: 6px; min-height: 14px; }

.item-row-add{ display:flex; gap:8px; align-items:flex-end; margin-bottom: 12px; }
.item-row-add .field{ margin-bottom:0; flex:1; }
.pending-chips{ display:flex; flex-wrap:wrap; gap:8px; margin-bottom: 14px; }

.autocomplete-wrap{ position: relative; }
.autocomplete-list{
  position:absolute; top: calc(100% + 4px); left:0; right:0;
  background: var(--panel-2); border: 1px solid var(--border); border-radius: 10px;
  max-height: 180px; overflow-y:auto; z-index: 20;
  display:none;
}
.autocomplete-list.show{ display:block; }
.autocomplete-item{
  padding: 8px 12px; font-size: 13px; cursor:pointer; text-transform:capitalize; color: var(--silver);
}
.autocomplete-item:hover{ background: var(--bg-elev); color: var(--silver-bright); }

.loading-dot{ display:inline-block; }

/* ---------- Duelo / Temporizador ---------- */
.duel-empty{
  text-align:center; padding: 60px 20px;
}
.duel-empty p{ color: var(--silver-dim); margin-bottom: 22px; font-size: 14px; }

.duel-card{
  background: linear-gradient(160deg, var(--panel) 0%, var(--bg-elev) 100%);
  border: 1px solid var(--border); border-radius: 18px;
  padding: 30px 20px; text-align:center; margin-bottom: 28px;
}
.duel-name{
  font-family:'Rajdhani', sans-serif; font-size: 22px; letter-spacing:1.5px;
  color: var(--silver-bright); margin-bottom: 4px;
}
.duel-date{ font-size: 12px; color: var(--silver-dim); letter-spacing:.5px; margin-bottom: 20px; }
.countdown{
  display:flex; justify-content:center; gap: 14px; flex-wrap:wrap;
}
.countdown .unit{ min-width: 64px; }
.countdown .num{
  font-family:'JetBrains Mono', monospace; font-size: 34px; font-weight:600;
  color: var(--silver-bright); background: var(--bg); border:1px solid var(--border);
  border-radius: 12px; padding: 10px 4px; display:block;
}
.countdown .lbl{ font-size: 10px; letter-spacing:1.5px; color: var(--silver-dim); margin-top:6px; display:block; text-transform:uppercase; }
.countdown.due .num{ color: var(--gold); border-color: var(--gold); }

.duel-top-actions{ display:flex; justify-content:center; gap:10px; margin-top:20px; flex-wrap:wrap; }

/* Wheel */
.wheel-wrap{
  display:flex; flex-direction:column; align-items:center; margin: 10px 0 30px;
}
.wheel-outer{
  position:relative; width: 220px; height: 220px; margin-bottom: 18px;
}
.wheel-outer.small{ width: 170px; height: 170px; }
.wheel-pointer{
  position:absolute; top:-6px; left:50%; transform:translateX(-50%);
  width:0; height:0; z-index:5;
  border-left: 10px solid transparent; border-right: 10px solid transparent;
  border-top: 18px solid var(--gold);
}
.wheel{
  width:100%; height:100%; border-radius:50%;
  border: 3px solid var(--border);
  position:relative; overflow:hidden;
  transition: transform 4.2s cubic-bezier(0.15, 0.85, 0.25, 1);
  box-shadow: 0 0 0 6px var(--bg-elev), 0 10px 30px rgba(0,0,0,0.4);
  background: var(--panel-2);
}
.wheel-seg{
  position:absolute; inset:0;
  transform-origin: 50% 50%;
}
.wheel-seg span{
  position:absolute; top: 18px; left:50%;
  font-family:'Rajdhani', sans-serif; font-weight:700; font-size: 14px;
  letter-spacing:1px; color: var(--bg);
  white-space:nowrap;
}
.wheel-center{
  position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
  width:34px; height:34px; border-radius:50%;
  background: var(--bg-elev); border:2px solid var(--gold); z-index:4;
}

/* Final prize wheels */
.final-wheels-row{
  display:flex; justify-content:center; gap: 36px; flex-wrap:wrap; margin-top: 6px;
}
.prize-legend{
  max-width: 220px; margin: 0 auto 14px; display:flex; flex-direction:column; gap:5px;
}
.prize-legend-item{
  display:flex; align-items:center; gap:8px; font-size:11px; color: var(--silver-dim); text-align:left;
}
.prize-swatch{ width:10px; height:10px; border-radius:3px; flex-shrink:0; }
.prize-result{
  font-family:'Rajdhani', sans-serif; font-size: 16px; font-weight:700; color: var(--silver-bright);
  background: var(--panel); border: 1px solid var(--border); border-radius: 12px;
  padding: 14px 20px; max-width: 220px; text-align:center;
}
.prize-result.good{ border-color: var(--gold); color: var(--gold); }

/* Bracket */
.bracket{
  display:flex; flex-direction:column; align-items:center; gap: 16px; margin: 10px 0 20px;
}
.bracket-match{
  background: var(--panel); border:1px solid var(--border); border-radius: 14px;
  padding: 16px 18px; width: 100%; max-width: 360px;
}
.bracket-match .match-label{
  font-size: 11px; letter-spacing:1.5px; color: var(--silver-dim); text-transform:uppercase;
  text-align:center; margin-bottom: 10px;
}
.bracket-vs{ display:flex; align-items:center; justify-content:center; gap: 14px; }
.bracket-player{
  flex:1; text-align:center; padding: 10px 8px; border-radius: 10px;
  border: 1px solid var(--border); cursor:pointer; transition: all .15s ease;
  font-family:'Rajdhani', sans-serif; font-weight:600; letter-spacing:.5px; color: var(--silver);
}
.bracket-player:hover{ border-color: var(--accent); color: var(--silver-bright); }
.bracket-player.winner{ border-color: var(--gold); color: var(--gold); background: rgba(201,168,106,0.08); }
.bracket-player.locked{ cursor:default; }
.bracket-vs-sep{ font-size: 11px; color: var(--silver-dim); }
.bracket-bye{ font-size: 11px; color: var(--silver-dim); text-align:center; margin-top:8px; }
.spin-note{ font-size: 12px; color: var(--silver-dim); text-align:center; margin-bottom: 14px; }

.duel-tally{ display:flex; justify-content:center; gap: 20px; margin: 4px 0 30px; flex-wrap:wrap; }
.duel-tally .t-item{ text-align:center; }
.duel-tally .t-name{ font-size: 12px; color: var(--silver-dim); letter-spacing:.5px; }
.duel-tally .t-wins{ font-family:'JetBrains Mono', monospace; font-size: 22px; color: var(--silver-bright); }

.duel-history-item{
  background: var(--panel); border:1px solid var(--border); border-radius: 12px;
  padding: 12px 16px; margin-bottom: 10px; font-size: 13px;
}
.duel-history-item .dh-name{ color: var(--silver-bright); font-weight:600; }
.duel-history-item .dh-date{ color: var(--silver-dim); font-size: 11px; margin-bottom:4px; }
.duel-history-item .dh-champ{ color: var(--gold); }
.duel-history-item .dh-reward{ margin-top:6px; font-size: 12px; color: var(--silver-dim); }

/* ---------- Casino ---------- */
:root{
  --neon-pink: #ff4fa3;
  --neon-cyan: #4fe3ff;
  --neon-yellow: #ffe14f;
  --neon-green: #4dffb0;
  --roulette-red: #c23b4a;
  --roulette-black: #1c1e26;
}

.casino-topbar{
  display:flex; align-items:center; justify-content:center; gap: 16px; flex-wrap:wrap;
  background: var(--panel); border:1px solid var(--border); border-radius: 16px;
  padding: 16px 20px; max-width: 520px; margin: 0 auto 22px;
}
.casino-topbar select{
  background: var(--panel-2); border:1px solid var(--border); border-radius:8px;
  padding: 8px 12px; color: var(--silver-bright); font-family:'Rajdhani',sans-serif; font-weight:600; font-size:14px;
}
.casino-balance{
  font-family:'JetBrains Mono', monospace; font-size: 20px; color: var(--neon-yellow);
  text-shadow: 0 0 10px rgba(255,225,79,0.5);
}

.casino-tabs{ display:flex; justify-content:center; gap:8px; margin-bottom: 26px; flex-wrap:wrap; }
.casino-tab-btn{
  background: transparent; border:1px solid var(--border); color: var(--silver-dim);
  font-family:'Rajdhani',sans-serif; font-weight:700; letter-spacing:1px; font-size:14px;

/* ---------------- Backend: Google Sheets via Apps Script ---------------- */
const API_URL = 'https://script.google.com/macros/s/AKfycbyM5X3Kn-l0HpiCcA3jNsSx80-KnfCB8PJMqNVFzOKbjob4csjXNJhNDF0dIJ8RsRjf/exec';

async function storeGet(key, def){
  for(let attempt=0; attempt<2; attempt++){
    try{
      const res = await fetch(`${API_URL}?key=${encodeURIComponent(key)}`);
      const text = await res.text();
      if(text === 'null' || text === ''){
        // no existe todavía en la hoja -> lo inicializamos con el valor por defecto
        try{
          await fetch(API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' }, // evita preflight CORS
            body: JSON.stringify({ key, value: JSON.stringify(def) })
          });
        }catch(e2){}
        return def;
      }
      return JSON.parse(text);
    }catch(e){
      if(attempt===1){
        console.error('storeGet failed', key, e);
        return def;
      }
      await new Promise(r=>setTimeout(r,300));
    }
  }
  return def;
}
async function storeSet(key, val){
  const delays = [200, 600, 1200, 2000];
  for(let attempt=0; attempt<=delays.length; attempt++){
    try{
      const res = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' }, // evita preflight CORS
        body: JSON.stringify({ key, value: JSON.stringify(val) })
      });
      const data = await res.json();
      if(data && data.ok) return true;
    }catch(e){
      console.error('storeSet failed', key, attempt, e);
    }
    if(attempt < delays.length) await new Promise(r=>setTimeout(r, delays[attempt]));
  }
  return false;
}

/* ---------------- Pending-save safety net ---------------- */
const pendingSaves = new Map(); // key -> retry function
function updateSyncBadge(){
  let el = document.getElementById('sync-badge');
  if(pendingSaves.size === 0){
    if(el) el.remove();
    return;
  }
  if(!el){
    el = document.createElement('div');
    el.id = 'sync-badge';
    el.style.cssText = 'position:fixed;top:14px;right:14px;background:#3a1f24;border:1px solid #7a3138;color:#e8b3ba;padding:7px 14px;border-radius:999px;font-size:11px;font-family:Inter,sans-serif;z-index:200;letter-spacing:.5px;';
    document.body.appendChild(el);
  }
  el.textContent = `⚠ sin guardar (${pendingSaves.size}) — no cierres la pestaña`;
}
function queueRetry(key, saveFn){
  pendingSaves.set(key, saveFn);
  updateSyncBadge();
}
async function flushPending(){
  for(const [key, saveFn] of [...pendingSaves.entries()]){
    const ok = await saveFn();
    if(ok){ pendingSaves.delete(key); }
  }
  updateSyncBadge();
}

// Aplica un premio de ruleta al ganador/perdedor: si es "N tickets" se suma solo al saldo,
// si no, queda como premio físico pendiente de entregar en el perfil.
async function applyPrizeToTrainer(t, prizeLabel, source){
  const m = prizeLabel.match(/^(\d+)\s+tickets?$/i);
  if(m){
    await addTickets(t, parseInt(m[1], 10), source);
  } else if(prizeLabel !== 'Nada'){
    await addPendingPrize(t, prizeLabel, source);
  }
}

function go(v, param){
  view = v;
  currentTrainer = param || null;
  if(v === 'casino'){ casinoNeedsProfileSelect = true; }
  render();

function render(){
  setActiveNav();
  if(duelCountdownInterval){ clearInterval(duelCountdownInterval); duelCountdownInterval = null; }
  const app = document.getElementById('app');
  if(!loaded){ app.innerHTML = '<div class="empty-state">Cargando…</div>'; return; }

  if(view === 'home') return renderHome(app);
  if(view === 'profile') return renderProfile(app, currentTrainer);
  if(view === 'history') return renderHistory(app);
  if(view === 'trade') return renderTrade(app);

}

function pickWeighted(list){
  const r = Math.random();
  let acc = 0;
  for(const item of list){
    acc += item.chance;
    if(r <= acc) return item;
  }
  return list[list.length-1];
}

async function pullLever(machineId){
  if(slotSpinning) return;
  if((tickets[casinoPlayer]||0) < SLOT_SPIN_COST){
    slotResultText = `No tienes suficientes tickets (necesitas ${SLOT_SPIN_COST}).`;
    slotResultClass = 'lose';
    render();
    return;
  }
  slotSpinning = true;
  slotResultText = '';
  slotResultClass = '';
  render();

  // Cobrar el coste de la tirada de inmediato
  await addTickets(casinoPlayer, -SLOT_SPIN_COST, 'Tirada de tragaperras');

  const outcome = pickWeighted(SLOT_OUTCOMES);

  // Animación: cada carrete cambia de símbolo rápido y va parando en cascada
  const finalSymbols = outcome.symbol
    ? [outcome.symbol, outcome.symbol, outcome.symbol]
    : [
        SLOT_FILLER_SYMBOLS[Math.floor(Math.random()*SLOT_FILLER_SYMBOLS.length)],
        SLOT_FILLER_SYMBOLS[Math.floor(Math.random()*SLOT_FILLER_SYMBOLS.length)],
        SLOT_FILLER_SYMBOLS[Math.floor(Math.random()*SLOT_FILLER_SYMBOLS.length)]
      ];
  // Evitar que "nada" salga igual en los 3 por casualidad (para que se lea bien como "no premio")
  if(!outcome.symbol && finalSymbols[0]===finalSymbols[1] && finalSymbols[1]===finalSymbols[2]){
    finalSymbols[2] = SLOT_FILLER_SYMBOLS.find(s=>s!==finalSymbols[0]) || finalSymbols[2];
  }

  const allSymbols = [...SLOT_FILLER_SYMBOLS, '👑','🥚','❤️‍🩹','🎁','💀'];
  const spinTimers = [];
  [0,1,2].forEach((reelIdx)=>{
    const timer = setInterval(()=>{
      const el = document.getElementById(`slot-reel-${reelIdx}`);
      if(el) el.textContent = allSymbols[Math.floor(Math.random()*allSymbols.length)];
    }, 70);
    spinTimers.push(timer);
  });

  const stopDelays = [900, 1500, 2100];
  stopDelays.forEach((delay, reelIdx)=>{
    setTimeout(()=>{
      clearInterval(spinTimers[reelIdx]);
      const el = document.getElementById(`slot-reel-${reelIdx}`);
      if(el){ el.textContent = finalSymbols[reelIdx]; el.classList.remove('spinning'); }
      slotReels[reelIdx] = finalSymbols[reelIdx];
    }, delay);
  });

  setTimeout(async ()=>{
    slotSpinning = false;

    if(outcome.type === 'jackpot'){
      slotResultText = `🎉 ¡JACKPOT! Gira la ruleta de legendarios de ${machineId ? SLOT_MACHINES.find(m=>m.id===machineId).name : ''}`;
      slotResultClass = 'win';
      render();
      slotJackpotMachine = machineId;
      slotJackpotRotation = 0;
      render();
    } else if(outcome.type === 'egg'){
      slotResultText = '🥚 ¡Te llevas un huevo random!';
      slotResultClass = 'win';
      await addPendingPrize(casinoPlayer, 'Huevo random', 'Tragaperras · ' + SLOT_MACHINES.find(m=>m.id===machineId).name);
      render();
    } else if(outcome.type === 'revive'){
      slotResultText = '❤️‍🩹 ¡Puedes revivir un Pokémon muerto a tu elección!';
      slotResultClass = 'win';
      await addPendingPrize(casinoPlayer, 'Revivir un Pokémon muerto a elegir', 'Tragaperras · ' + SLOT_MACHINES.find(m=>m.id===machineId).name);
      render();
    } else if(outcome.type === 'capture'){
      slotResultText = '🎁 ¡1 captura extra!';
      slotResultClass = 'win';
      await addPendingPrize(casinoPlayer, '1 captura extra', 'Tragaperras · ' + SLOT_MACHINES.find(m=>m.id===machineId).name);
      render();
    } else if(outcome.type === 'curse'){
      slotResultText = '💀 Mala suerte, pierdes 2 tickets extra.';
      slotResultClass = 'lose';
      await addTickets(casinoPlayer, -2, 'Mala suerte en la tragaperras');
      render();
    } else {
      slotResultText = 'Sin premio esta vez. ¡Prueba otra vez!';
      slotResultClass = '';
      render();
    }
  }, 2400);
}

function renderJackpotWheel(){

  const segAngle = 360/legendaries.length;

            ${legendaries.map((l,i)=>{
              const angle = i*segAngle + segAngle/2;
              const norm = ((angle % 360)+360)%360;
              const flip = norm > 90 && norm < 270;
              return `<div class="wheel-seg" style="transform: rotate(${angle}deg);"><span style="transform: translateX(-50%) ${flip?'rotate(180deg)':''};">${l}</span></div>`;
            }).join('')}

function spinJackpotWheel(){
  if(slotJackpotSpinning) return;
  const machine = SLOT_MACHINES.find(m=>m.id===slotJackpotMachine);
  const legendaries = machine.legendaries;
  slotJackpotSpinning = true;
  render();

  const idx = Math.floor(Math.random()*legendaries.length);
  const segAngle = 360/legendaries.length;
  const center = idx*segAngle + segAngle/2;
  const fullSpins = 5 + Math.floor(Math.random()*2);
  const target = fullSpins*360 + (360-center);
  slotJackpotRotation += target;

  const wheelEl = document.getElementById('jackpot-wheel');
  if(wheelEl){
    wheelEl.style.transition = 'transform 4.2s cubic-bezier(0.15, 0.85, 0.25, 1)';
    void wheelEl.offsetWidth;
    wheelEl.style.transform = `rotate(${slotJackpotRotation}deg)`;
  }

  setTimeout(async ()=>{
    slotJackpotSpinning = false;
    const won = legendaries[idx];
    await addPendingPrize(casinoPlayer, `Legendario: ${won}`, 'Jackpot tragaperras · ' + machine.name);
    slotJackpotMachine = null;
    casinoMachine = null;
    slotResultText = '';
    slotResultClass = '';
    render();

let rouletteLastResult = null;
let rouletteResultText = '';
let rouletteResultClass = '';

function rouletteGradient(){
  const segAngle = 360/ROULETTE_WHEEL_ORDER.length;
  const stops = ROULETTE_WHEEL_ORDER.map((n,i)=>{
    const c = rouletteColorOf(n);
    const color = c==='green' ? '#2e8b57' : (c==='red' ? 'var(--roulette-red)' : 'var(--roulette-black)');
    return `${color} ${i*segAngle}deg ${(i+1)*segAngle}deg`;
  }).join(', ');
  return `conic-gradient(${stops})`;
}

function rouletteNumbersHTML(){
  const segAngle = 360/ROULETTE_WHEEL_ORDER.length;
  const radius = 112; // distancia desde el centro, ajustada al radio de la rueda (280px)
  return ROULETTE_WHEEL_ORDER.map((n,i)=>{
    const angle = i*segAngle + segAngle/2;
    return `<span class="roulette-number" style="transform: translate(-50%,-50%) rotate(${angle}deg) translateY(-${radius}px) rotate(${-angle}deg);">${n}</span>`;
  }).join('');
}

function adjustRouletteBet(delta){
  rouletteBetAmount = Math.max(1, rouletteBetAmount + delta);
  render();
}
function selectRouletteColor(color){
  rouletteBetType = 'color';
  rouletteBetColor = color;
  rouletteBetNumber = null;
  render();
}
function selectRouletteNumber(n){
  rouletteBetType = 'number';
  rouletteBetNumber = n;
  rouletteBetColor = null;
  render();

async function spinRoulette(){
  if(rouletteSpinning) return;
  if(!rouletteBetType){
    rouletteResultText = 'Elige un color o un número antes de girar.';
    rouletteResultClass = 'lose';
    render();
    return;
  }
  if((tickets[casinoPlayer]||0) < rouletteBetAmount){
    rouletteResultText = 'No tienes suficientes tickets para esa apuesta.';
    rouletteResultClass = 'lose';
    render();
    return;
  }

  rouletteSpinning = true;
  rouletteResultText = '';
  rouletteResultClass = '';
  render();

  await addTickets(casinoPlayer, -rouletteBetAmount, 'Apuesta en la ruleta');

  const winIdx = Math.floor(Math.random()*ROULETTE_WHEEL_ORDER.length);
  const winNumber = ROULETTE_WHEEL_ORDER[winIdx];
  const winColor = rouletteColorOf(winNumber);

  const segAngle = 360/ROULETTE_WHEEL_ORDER.length;
  const center = winIdx*segAngle + segAngle/2;
  const fullSpins = 6 + Math.floor(Math.random()*2);
  const target = fullSpins*360 + (360-center);
  rouletteRotation += target;

  const wheelEl = document.getElementById('roulette-wheel');
  if(wheelEl){
    wheelEl.style.transform = `rotate(${rouletteRotation}deg)`;
  }

  setTimeout(async ()=>{
    rouletteSpinning = false;
    rouletteLastResult = winNumber;

    let payout = 0;
    if(rouletteBetType === 'number' && rouletteBetNumber === winNumber){
      payout = rouletteBetAmount * 35;
    } else if(rouletteBetType === 'color' && rouletteBetColor === winColor){
      payout = rouletteBetAmount * (winColor==='green' ? 14 : 2);
    }

    if(payout > 0){
      rouletteResultText = `🎉 Salió el ${winNumber} (${winColor==='red'?'rojo':winColor==='black'?'negro':'verde'}) · ¡Ganas ${payout} tickets!`;
      rouletteResultClass = 'win';
      await addTickets(casinoPlayer, payout, 'Premio de la ruleta');
    } else {
      rouletteResultText = `Salió el ${winNumber} (${winColor==='red'?'rojo':winColor==='black'?'negro':'verde'}). No has acertado.`;
      rouletteResultClass = 'lose';
    }
    render();
  }, 4600);
}

function spinSancionWheel(){
  if(sancionWheelSpinning || sancionState.prize) return;
  const outcomes = SANCION_WHEEL;
  sancionWheelSpinning = true;
  render();

  const idx = Math.floor(Math.random()*outcomes.length);
  const segAngle = 360/outcomes.length;
  const center = idx*segAngle + segAngle/2;
  const fullSpins = 5 + Math.floor(Math.random()*2);
  const target = fullSpins*360 + (360 - center);
  sancionWheelRotation += target;

  const wheelEl = document.getElementById('sancion-wheel');
  if(wheelEl){
    wheelEl.style.transition = 'transform 4.2s cubic-bezier(0.15, 0.85, 0.25, 1)';
    void wheelEl.offsetWidth;
    wheelEl.style.transform = `rotate(${sancionWheelRotation}deg)`;
  }

  setTimeout(async ()=>{
    const outcome = outcomes[idx];
    sancionWheelSpinning = false;
    sancionState.prize = outcome.label;
    render();
    const ok = await saveSancion();
    if(!ok) queueRetry('sancion', saveSancion);
  }, 4300);
}

async function closeSancion(){
  pushHistory(`⚖️ ${NAMES[sancionState.offender]} cometió una infracción y le tocó: ${sancionState.prize}`);
  sancionState = { offender:null, prize:null };
  sancionWheelRotation = 0;
  sancionWheelSpinning = false;
  render();
  const ok = await saveSancion();
  if(!ok) queueRetry('sancion', saveSancion);
}

/* ---------------- DUELO / TEMPORIZADOR ---------------- */
function toLocalInputValue(date){
  const pad = n => String(n).padStart(2,'0');
  return `${date.getFullYear()}-${pad(date.getMonth()+1)}-${pad(date.getDate())}T${pad(date.getHours())}:${pad(date.getMinutes())}`;
}
function endOfWeek(){
  const d = new Date();
  const day = d.getDay(); // 0=domingo
  const diffToSunday = day === 0 ? 0 : 7 - day;
  const end = new Date(d.getFullYear(), d.getMonth(), d.getDate() + diffToSunday, 23, 59);
  return end;
}

function updateDuelCountdown(){
  const el = document.getElementById('duel-countdown');
  if(!el || !duelState.scheduled) return;
  const target = new Date(duelState.scheduled.datetime).getTime();
  const now = Date.now();
  let diff = target - now;
  if(diff <= 0){
    el.classList.add('due');
    el.innerHTML = `<div style="font-family:'Rajdhani',sans-serif;font-size:20px;letter-spacing:1.5px;color:var(--gold);">¡Es la hora del combate!</div>`;
    return;
  }
  el.classList.remove('due');
  const d = Math.floor(diff/(1000*60*60*24));
  const h = Math.floor((diff/(1000*60*60))%24);
  const m = Math.floor((diff/(1000*60))%60);
  const s = Math.floor((diff/1000)%60);
  el.innerHTML = `
    <div class="unit"><span class="num">${d}</span><span class="lbl">días</span></div>
    <div class="unit"><span class="num">${String(h).padStart(2,'0')}</span><span class="lbl">horas</span></div>
    <div class="unit"><span class="num">${String(m).padStart(2,'0')}</span><span class="lbl">min</span></div>
    <div class="unit"><span class="num">${String(s).padStart(2,'0')}</span><span class="lbl">seg</span></div>
  `;
}

function wheelGradientAndSegs(candidates){
  const colors = ['var(--accent)', 'var(--gold)', 'var(--silver)'];
  const segAngle = 360 / candidates.length;
  const stops = candidates.map((t,i)=> `${colors[i%colors.length]} ${i*segAngle}deg ${(i+1)*segAngle}deg`).join(', ');
  const segs = candidates.map((t,i)=>{
    const angle = i*segAngle + segAngle/2;
    const norm = ((angle % 360) + 360) % 360;
    const flip = norm > 90 && norm < 270; // evita texto boca abajo en la mitad inferior
    return `
      <div class="wheel-seg" style="transform: rotate(${angle}deg);">
        <span style="transform: translateX(-50%) ${flip ? 'rotate(180deg)' : ''};">${NAMES[t]}</span>
      </div>
    `;
  }).join('');
  return { gradient: `conic-gradient(${stops})`, segs };
}

function spinWheel(){
  if(duelSpinning) return;
  const candidates = TRAINERS.filter(t=> !(duelState.picks||[]).includes(t));
  if(candidates.length < 2) return; // ya está decidido
  duelSpinning = true;
  render();
  const idx = Math.floor(Math.random()*candidates.length);
  const segAngle = 360/candidates.length;
  const center = idx*segAngle + segAngle/2;
  const fullSpins = 5 + Math.floor(Math.random()*2);
  const target = fullSpins*360 + (360 - center);
  duelWheelRotation += target;
  const wheelEl = document.getElementById('duel-wheel');
  wheelEl.style.transition = 'transform 4.2s cubic-bezier(0.15, 0.85, 0.25, 1)';
  // forzar reflow para que la transición se aplique
  void wheelEl.offsetWidth;
  wheelEl.style.transform = `rotate(${duelWheelRotation}deg)`;

  setTimeout(async ()=>{
    duelSpinning = false;
    const picked = candidates[idx];
    duelState.picks = [...(duelState.picks||[]), picked];
    duelWheelRotation = 0; // la siguiente rueda tiene otro número de candidatos, debe arrancar limpia
    if(duelState.picks.length === 2){
      const bye = TRAINERS.find(t=> !duelState.picks.includes(t));
      duelState.bye = bye;
      duelState.match1 = { p1: duelState.picks[0], p2: duelState.picks[1] };
      duelState.match1Winner = null;
      duelState.match1LoserPrize = null;
      duelState.finalWinner = null;
      duelState.finalWinnerPrize = null;
      duelState.finalLoserPrize = null;
    }
    render();
    const ok = await saveDuelState();
    if(!ok) queueRetry('duel', saveDuelState);
  }, 4300);
}

function spinFinalWheel(role){
  const spinningFlag = role==='winner' ? finalWheelSpinningWinner : finalWheelSpinningLoser;
  const prizeAlreadySet = role==='winner' ? duelState.finalWinnerPrize : duelState.finalLoserPrize;
  if(spinningFlag || prizeAlreadySet) return;
  const prizes = role==='winner' ? WINNER_PRIZES : LOSER_PRIZES;
  const wheelId = role==='winner' ? 'final-wheel-winner' : 'final-wheel-loser';

  if(role==='winner') finalWheelSpinningWinner = true; else finalWheelSpinningLoser = true;
  render();

  const idx = Math.floor(Math.random()*prizes.length);
  const segAngle = 360/prizes.length;
  const center = idx*segAngle + segAngle/2;
  const fullSpins = 5 + Math.floor(Math.random()*2);
  const target = fullSpins*360 + (360 - center);
  if(role==='winner'){ finalWheelRotationWinner += target; } else { finalWheelRotationLoser += target; }

  const wheelEl = document.getElementById(wheelId);
  if(wheelEl){
    wheelEl.style.transition = 'transform 4.2s cubic-bezier(0.15, 0.85, 0.25, 1)';
    void wheelEl.offsetWidth;
    wheelEl.style.transform = `rotate(${role==='winner'?finalWheelRotationWinner:finalWheelRotationLoser}deg)`;
  }

  setTimeout(async ()=>{
    const prize = prizes[idx];
    const trainer = role==='winner' ? duelState.finalWinner : [duelState.match1Winner, duelState.bye].find(p=> p!==duelState.finalWinner);
    if(role==='winner'){
      finalWheelSpinningWinner = false;
      duelState.finalWinnerPrize = prize;
    } else {
      finalWheelSpinningLoser = false;
      duelState.finalLoserPrize = prize;
    }
    render();
    const ok = await saveDuelState();
    if(!ok) queueRetry('duel', saveDuelState);
    await applyPrizeToTrainer(trainer, prize, role==='winner' ? 'Ruleta del ganador de la final' : 'Ruleta del perdedor de la final');
    render();
  }, 4300);
}

async function finishDuel(){
  const { scheduled, bye, match1, match1Winner, match1LoserPrize, finalWinner, finalWinnerPrize, finalLoserPrize } = duelState;
  const finalLoser = [match1Winner, bye].find(p=> p!==finalWinner);
  duelHistory.unshift({

  duelState = { scheduled:null, picks:[], bye:null, match1:null, match1Winner:null, match1LoserPrize:null, finalWinner:null, finalWinnerPrize:null, finalLoserPrize:null };
  duelWheelRotation = 0;
  finalWheelRotationWinner = 0;
  finalWheelRotationLoser = 0;
  finalWheelSpinningWinner = false;

}

/* ---------------- PokeAPI helpers ---------------- */
async function fetchPokemonSprite(name){
  const slug = name.toLowerCase().trim().replace(/\s+/g,'-');
  const res = await fetch('https://pokeapi.co/api/v2/pokemon/'+slug);
  if(!res.ok) throw new Error('not found');
  const data = await res.json();
  const sprite = (data.sprites.other && data.sprites.other['official-artwork'] && data.sprites.other['official-artwork'].front_default) || data.sprites.front_default;
  if(!sprite) throw new Error('no sprite');
  return { name: data.name, sprite };
}
async function fetchItemSprite(name){
  const slug = name.toLowerCase().trim().replace(/\s+/g,'-');
  const res = await fetch('https://pokeapi.co/api/v2/item/'+slug);
  if(!res.ok) throw new Error('not found');
  const data = await res.json();
  const sprite = data.sprites && data.sprites.default;
  if(!sprite) throw new Error('no sprite');
  return { name: data.name, sprite };
}

/* ---------------- Autocomplete ---------------- */
function attachAutocomplete(inputEl, dropdownEl, getList){
  inputEl.addEventListener('input', ()=>{
    const val = inputEl.value.trim().toLowerCase();
    if(val.length < 3){ dropdownEl.classList.remove('show'); dropdownEl.innerHTML=''; return; }
    const list = getList();
    const matches = list.filter(n=> n.startsWith(val)).slice(0, 8);
    if(matches.length === 0){ dropdownEl.classList.remove('show'); dropdownEl.innerHTML=''; return; }
    dropdownEl.innerHTML = matches.map(n=>`<div class="autocomplete-item">${n.replace(/-/g,' ')}</div>`).join('');
    dropdownEl.classList.add('show');
    [...dropdownEl.children].forEach((el,i)=>{
      el.onclick = ()=>{
        inputEl.value = matches[i];
        dropdownEl.classList.remove('show'); dropdownEl.innerHTML='';
        inputEl.focus();
      };
    });
  });
  inputEl.addEventListener('blur', ()=> setTimeout(()=>{ dropdownEl.classList.remove('show'); }, 150));
}

  const overlay = document.createElement('div');

  overlay.innerHTML = `<div class="modal">${html}</div>`;
  if(closable){
    overlay.addEventListener('click', (e)=>{ if(e.target === overlay) closeModal(); });
  }
  document.body.appendChild(overlay);
}

}

async function addPendingItem(){
  const type = document.getElementById('it-type').value;
  const name = document.getElementById('it-name').value.trim();
  const err = document.getElementById('offer-err');
  err.textContent = '';
  if(!name) return;
  err.textContent = 'Buscando…';
  try{
    const res = type==='pokemon' ? await fetchPokemonSprite(name) : await fetchItemSprite(name);
    pendingItems.push({ type, name: res.name, sprite: res.sprite });
    document.getElementById('it-name').value = '';
    err.textContent = '';
    renderPendingChips();
  }catch(e){

function renderPendingChips(){
  document.getElementById('pending-chips').innerHTML = pendingItems.map((it,i)=>
    `<div class="chip"><img src="${it.sprite}"><span>${it.name.replace(/-/g,' ')}</span> <button class="ghost" style="padding:0 6px;" onclick="removePendingItem(${i})">✕</button></div>`
  ).join('');
}
function removePendingItem(i){ pendingItems.splice(i,1); renderPendingChips(); }

async function submitOffer(mode, offerId){
  const trainer = document.getElementById('tr-select').value;
  const err = document.getElementById('offer-err');
  if(pendingItems.length === 0){ err.textContent = 'Añade al menos una cosa a la oferta.'; return; }

  if(mode === 'offer'){
    tradesActive.unshift({ id: crypto.randomUUID(), trainer, items: pendingItems, ts: Date.now(), counters: [] });
    pushHistory(`🔁 ${NAMES[trainer]} publicó una oferta de trade`);
  } else {
    const offer = tradesActive.find(o=>o.id===offerId);
    if(offer){
      offer.counters.push({ id: crypto.randomUUID(), trainer, items: pendingItems, ts: Date.now() });
      pushHistory(`🔁 ${NAMES[trainer]} ofreció algo a cambio en un trade`);
    }
  }
  closeModal();
  render();
  const ok = await saveTrades();
  if(!ok) queueRetry('trades', saveTrades);
}

async function acceptTrade(offerId, counterId){
  const offer = tradesActive.find(o=>o.id===offerId);
  if(!offer) return;
  const counter = offer.counters.find(c=>c.id===counterId);
  if(!counter) return;
  if(!confirm(`¿Aceptar que ${NAMES[offer.trainer]} dé sus cosas a cambio de lo de ${NAMES[counter.trainer]}?`)) return;

  tradesHistory.unshift({
    id: crypto.randomUUID(),
    offerTrainer: offer.trainer, offerItems: offer.items,
    counterTrainer: counter.trainer, counterItems: counter.items,
    ts: Date.now()
  });
  tradesActive = tradesActive.filter(o=>o.id!==offerId);
  pushHistory(`🤝 Trade cerrado entre ${NAMES[offer.trainer]} y ${NAMES[counter.trainer]}`);
  render();
  const ok = await saveTrades();
  if(!ok) queueRetry('trades', saveTrades);
}

async function cancelOffer(offerId){
  if(!confirm('¿Cancelar esta oferta?')) return;
  tradesActive = tradesActive.filter(o=>o.id!==offerId);
  render();
  const ok = await saveTrades();
  if(!ok) queueRetry('trades', saveTrades);
}

async function deleteTradeRecord(id){
  if(!confirm('¿Eliminar este trade del historial? (Úsalo cuando ya esté pagado)')) return;
  tradesHistory = tradesHistory.filter(r=>r.id!==id);
  render();
  const ok = await saveTrades();
  if(!ok) queueRetry('trades', saveTrades);
}

    await loadAll();

  }, 20000);
})();
